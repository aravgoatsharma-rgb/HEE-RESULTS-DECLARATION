<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HEE - Results Portal</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>HEE 2024</h1>
        <p>Head Entrance Exam Results</p>
        <input type="text" id="rollInput" placeholder="Enter Roll Number">
        <button onclick="searchResult()">View Result</button>
    </div>

    <script>
        function searchResult() {
            const roll = document.getElementById('rollInput').value;
            if (roll) {
                window.location.href = `results.html?roll=${roll}`;
            } else {
                alert("Please enter a roll number");
            }
        }
        // Allows pressing "Enter" key
        document.getElementById('rollInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchResult();
        });
    </script>
</body>
</html>
